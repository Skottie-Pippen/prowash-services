<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProWash Services | Product Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
        }
        @media (max-width: 820px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .form-panel, .list-panel {
            background: var(--card);
            border-radius: 22px;
            padding: 2.4rem;
            box-shadow: var(--shadow);
        }
        .form-panel h2, .list-panel h2 {
            font-family: "Fraunces", serif;
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
        }
        .product-form { display: grid; gap: 1rem; }
        .product-form .form-field { display: grid; gap: 0.4rem; }
        .product-form textarea { resize: vertical; min-height: 80px; }
        .btn-row { display: flex; gap: 0.8rem; margin-top: 0.4rem; }
        .button-secondary {
            border: 2px solid var(--brand); padding: 0.75rem 1.6rem;
            border-radius: 999px; background: transparent; color: var(--brand);
            font-weight: 700; cursor: pointer; transition: background 0.2s, color 0.2s;
        }
        .button-secondary:hover { background: var(--brand); color:#fff; }

        .search-row { display:flex; gap:0.6rem; margin-bottom:1rem; }
        .search-row input { flex:1; }
        .search-row button { white-space:nowrap; }

        .product-card {
            background: var(--bg); border: 1px solid var(--line); border-radius: 16px;
            padding: 1.4rem; display: grid; gap: 0.5rem; margin-bottom: 1rem;
            transition: box-shadow 0.2s;
        }
        .product-card:hover { box-shadow: 0 8px 24px rgba(15,28,28,0.1); }
        .product-card h3 { font-size: 1.1rem; }
        .product-meta { display:flex; gap:1rem; flex-wrap:wrap; font-size:0.92rem; color:var(--muted); }
        .product-meta strong { color: var(--brand-dark); }
        .product-card p.description { color:var(--muted); font-size:0.95rem; }
        .card-actions { display:flex; gap:0.6rem; margin-top:0.3rem; }
        .btn-edit, .btn-delete {
            border:none; padding:0.45rem 1rem; border-radius:999px;
            font-weight:700; font-size:0.85rem; cursor:pointer; transition:opacity 0.2s;
        }
        .btn-edit   { background:var(--highlight); color:#9b5c00; }
        .btn-delete { background:#fde2e1; color:#9b1d1d; }
        .btn-edit:hover, .btn-delete:hover { opacity:0.8; }
        .empty-state { text-align:center; padding:2rem 0; color:var(--muted); font-style:italic; }
        .toast {
            position:fixed; bottom:1.5rem; right:1.5rem; padding:0.85rem 1.4rem;
            border-radius:12px; color:#fff; font-weight:600; font-size:0.95rem;
            z-index:1000; opacity:0; transform:translateY(10px);
            transition:opacity 0.3s, transform 0.3s;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast-success { background:var(--brand); }
        .toast-error   { background:#c0392b; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">ProWash <span>Services</span></div>
            <nav class="nav" aria-label="Primary">
                <a href="index.html">Home</a>
                <a href="orders.html">Orders</a>
                <a href="signup.html">Signup</a>
                <a href="products.html">Products</a>
            </nav>
        </div>
    </header>

    <main class="form-section">
        <div class="container">
            <h1 class="section-title" style="margin-bottom:1.5rem">Product Dashboard</h1>
            <div class="dashboard-grid">
                <!-- Form Panel -->
                <div class="form-panel">
                    <h2 id="form-heading">Add New Product</h2>
                    <form class="product-form" id="product-form" onsubmit="return false;">
                        <input type="hidden" id="edit-id" value="">
                        <div class="form-field">
                            <label for="product-name">Product Name</label>
                            <input id="product-name" type="text" placeholder="e.g. Surface Cleaner Pro" required>
                        </div>
                        <div class="form-field">
                            <label for="product-price">Price ($)</label>
                            <input id="product-price" type="number" min="0" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-field">
                            <label for="product-category">Category</label>
                            <select id="product-category" required>
                                <option value="">Select a category</option>
                                <option value="Equipment">Equipment</option>
                                <option value="Cleaning Solution">Cleaning Solution</option>
                                <option value="Accessory">Accessory</option>
                                <option value="Service Package">Service Package</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="product-stock">Stock Quantity</label>
                            <input id="product-stock" type="number" min="0" step="1" placeholder="0" required>
                        </div>
                        <div class="form-field">
                            <label for="product-description">Description</label>
                            <textarea id="product-description" rows="3" placeholder="Describe the product..."></textarea>
                        </div>
                        <div class="btn-row">
                            <button class="button-primary" type="button" id="btn-submit">Add Product</button>
                            <button class="button-secondary" type="button" id="btn-cancel" style="display:none">Cancel Edit</button>
                        </div>
                    </form>
                </div>

                <!-- Product List Panel -->
                <div class="list-panel">
                    <h2>Current Products</h2>
                    <div class="search-row">
                        <input id="search-input" type="text" placeholder="Search products…">
                        <button class="button-primary" id="btn-search">Search</button>
                    </div>
                    <div id="product-list">
                        <p class="empty-state">Loading products…</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <footer>
        <div class="container">ProWash Services | Product Management Dashboard</div>
    </footer>

    <script src="product_app.js"></script>
</body>
</html>
